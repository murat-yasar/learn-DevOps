name: 01 - Building Block

on: push

jobs:
   echo-hello:
      runs-on: ubuntu-latest
      steps:
         - name: Say hello
           run: echo "Hello world!"
   echo-goodbye:
      runs-on: ubuntu-latest
      steps:
         - name: Failed step
           run: |
            echo "This step has failed!"
            exit 1
         - name: Say goodbye
           run: echo "Goodbye world!"